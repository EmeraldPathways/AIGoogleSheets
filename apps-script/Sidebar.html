<!doctype html>
<html>
  <head>
    <base target="_top" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f5f7fb;
        font-family: Arial, sans-serif;
      }

      body {
        box-sizing: border-box;
        padding: 10px;
      }

      .shell {
        display: flex;
        flex-direction: column;
        gap: 8px;
        height: calc(100vh - 20px);
      }

      .meta {
        box-sizing: border-box;
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        background: #ffffff;
        color: #334155;
        font-size: 12px;
        line-height: 1.45;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }

      iframe {
        display: block;
        box-sizing: border-box;
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        border: 0;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="meta" id="context">Loading sheet context...</div>
      <iframe id="app-frame" src="https://semiotic-method-492411-i4.uc.r.appspot.com"></iframe>
    </div>
    <script>
      var frame = document.getElementById('app-frame');

      function pushContext() {
        google.script.run.withSuccessHandler(function(ctx) {
          document.getElementById('context').textContent =
            'Sheet: ' + ctx.spreadsheetName + ' | Range: ' + (ctx.activeRangeA1 || 'N/A');
          frame.contentWindow.postMessage(
            { source: 'apps-script-sidebar', type: 'HOST_CONTEXT', context: ctx },
            '*'
          );
        }).getActiveSpreadsheetContext();
      }

      window.addEventListener('message', function(event) {
        var data = event.data || {};
        if (data.source !== 'aigs-webapp') return;

        if (data.type === 'APP_READY' || data.type === 'REQUEST_CONTEXT') {
          pushContext();
          return;
        }

        if (data.type === 'INSERT_RESULT') {
          google.script.run.withSuccessHandler(function(result) {
            frame.contentWindow.postMessage(
              { source: 'apps-script-sidebar', type: 'INSERT_RESULT_ACK', result: result },
              '*'
            );
          }).insertAnalysisResult(data.payload || {});
          return;
        }

        if (data.type === 'RESTORE_SESSION') {
          frame.contentWindow.postMessage(
            { source: 'apps-script-sidebar', type: 'RESTORED_SESSION', session: data.session },
            '*'
          );
        }
      });

      pushContext();
    </script>
  </body>
</html>
