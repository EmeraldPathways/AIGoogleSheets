runtime: python312

entrypoint: gunicorn -b :$PORT app:app

env_variables:
  ALLOWED_ORIGINS: "https://your-project.appspot.com"
  DEFAULT_AI_PROVIDER: "kimi"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RATE_LIMIT_MAX_REQUESTS: "20"
  MAX_CELL_CHARS: "2000"
  MAX_ROWS: "500"

handlers:
  - url: /api/.*
    script: auto
    secure: always

  - url: /static
    static_dir: static
    expiration: 1h

  - url: /.*
    static_files: static/index.html
    upload: static/index.html
    secure: always

automatic_scaling:
  min_instances: 0
  max_instances: 2
