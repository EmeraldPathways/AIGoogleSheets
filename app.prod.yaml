runtime: python312

entrypoint: gunicorn --timeout 120 -b :$PORT app:app

env_variables:
  APP_ENV: "production"
  GOOGLE_CLIENT_ID: "243073050765-rrtphqevc23nj1nka4uteii0hb94nbb5.apps.googleusercontent.com"
  ALLOWED_ORIGINS: "https://your-project.appspot.com"
  DEFAULT_AI_PROVIDER: "kimi"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RATE_LIMIT_MAX_REQUESTS: "40"
  REDIS_URL: ""
  MAX_CELL_CHARS: "2000"
  MAX_ROWS: "500"
  UPSTREAM_MAX_ATTEMPTS: "3"
  UPSTREAM_RETRY_BASE_DELAY_MS: "250"
  EMBED_ALLOWED_PARENTS: "https://script.google.com https://script.googleusercontent.com"
  KIMI_API_ENDPOINT: "https://api.moonshot.ai/v1/chat/completions"
  KIMI_API_KEY_SECRET_RESOURCE: "projects/243073050765/secrets/kimi-api-key/versions/latest"
  OPENAI_API_KEY_SECRET_RESOURCE: "projects/243073050765/secrets/openai-api-key/versions/latest"

handlers:
  - url: /healthz
    script: auto
    secure: always

  - url: /api/.*
    script: auto
    secure: always

  - url: /static
    static_dir: static
    expiration: 1h

  - url: /.*
    static_files: static/index.html
    upload: static/index.html
    secure: always

automatic_scaling:
  min_instances: 1
  max_instances: 4
