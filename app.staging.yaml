runtime: python312

entrypoint: gunicorn -b :$PORT app:app

env_variables:
  APP_ENV: "staging"
  ALLOWED_ORIGINS: "https://staging-dot-your-project.appspot.com"
  DEFAULT_AI_PROVIDER: "kimi"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RATE_LIMIT_MAX_REQUESTS: "30"
  REDIS_URL: ""
  MAX_CELL_CHARS: "2000"
  MAX_ROWS: "500"
  UPSTREAM_MAX_ATTEMPTS: "3"
  UPSTREAM_RETRY_BASE_DELAY_MS: "250"
  EMBED_ALLOWED_PARENTS: "https://script.google.com https://script.googleusercontent.com"
  KIMI_API_KEY_SECRET_RESOURCE: ""
  OPENAI_API_KEY_SECRET_RESOURCE: ""

handlers:
  - url: /api/.*
    script: auto
    secure: always

  - url: /static
    static_dir: static
    expiration: 1h

  - url: /.*
    static_files: static/index.html
    upload: static/index.html
    secure: always

automatic_scaling:
  min_instances: 0
  max_instances: 1
